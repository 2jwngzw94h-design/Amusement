<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cartographie Monuments Historiques</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fastbootstrap/atlassian-design-for-bootstrap@1.0.7/dist/css/atlassian.min.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-subtle">
    <header class="navbar bg-body border-bottom px-3">
      <h1 class="h4 mb-0">Monuments Historiques - Explorateur cartographique</h1>
    </header>

    <main class="container-fluid py-3">
      <div class="row g-3 app-layout">
        <aside class="col-12 col-lg-4 col-xl-3">
          <section class="card shadow-sm h-100">
            <div class="card-header">
              <h2 class="h6 mb-0">Filtres</h2>
            </div>
            <div class="card-body overflow-auto" id="filters-panel">
              <div class="mb-3">
                <label for="layer-select" class="form-label">Couche</label>
                <select id="layer-select" class="form-select"></select>
              </div>

              <div class="mb-3">
                <label for="search-input" class="form-label">Recherche textuelle</label>
                <input
                  id="search-input"
                  type="search"
                  class="form-control"
                  placeholder="Ex: cathédrale"
                />
              </div>

              <div id="dynamic-filters" class="vstack gap-3"></div>

              <div class="d-grid mt-3">
                <button id="reset-btn" class="btn btn-outline-secondary">Réinitialiser</button>
              </div>
            </div>
          </section>
        </aside>

        <section class="col-12 col-lg-8 col-xl-9">
          <article class="card shadow-sm map-card">
            <div class="card-body p-0 position-relative">
              <div id="status-banner" class="alert alert-info m-3 py-2" role="status">
                Chargement des métadonnées du service ArcGIS…
              </div>
              <div id="map"></div>
            </div>
          </article>
        </section>
      </div>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js" type="module"></script>
  </body>
</html>
